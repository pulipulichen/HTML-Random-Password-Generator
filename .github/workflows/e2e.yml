name: E2E Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Podman
      uses: gacts/install-podman@v1

    - name: Install podman-compose
      run: |
        python3 -m pip install --user --upgrade pip
        python3 -m pip install --user podman-compose
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Verify Podman toolchain
      run: |
        podman --version
        podman-compose --version

    - name: Run E2E tests with podman-compose
      run: podman-compose up --build --abort-on-container-exit --exit-code-from test-runner

    - name: Upload Playwright HTML report
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload Playwright videos
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-videos
        path: playwright-report-videos/
        retention-days: 7

    - name: Tear down containers
      if: always()
      run: podman-compose down -v
